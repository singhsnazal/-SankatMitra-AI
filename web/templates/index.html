<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SankatMitra AI</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="bg"></div>

  <div class="app">
    <header class="header">
      <div class="brand">
        <!-- LOGO IMAGE -->
        <img src="/static/logo.png" alt="AapdaAssist AI Logo" class="logo" />

        <div>
          <div class="title">SankatMitra AI</div>
          <div class="subtitle">
            AI-Driven Decision Support for Disaster Management and Crisis Response
          </div>
        </div>
      </div>

      <button id="clearBtn" class="btn ghost">Clear</button>
    </header>

    <main id="chat" class="chat"></main>

    <footer class="composer">
      <input id="query" type="text" placeholder="Ask something from your documents..." />
      <button id="sendBtn" class="btn primary">Send</button>
    </footer>
  </div>

  <script src="/static/app.js"></script>
</body>
</html>
